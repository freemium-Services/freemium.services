name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build site
        run: |
          npm install
          npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify sitemap availability
        run: |
          npm run verify:sitemaps

      - name: Verify build artifacts
        run: |
          if [ ! -f "public/build-report.json" ]; then
            echo "Build failed: build-report.json not found. Did the validation fail?"
            exit 1
          fi
          cat public/build-report.json

      - name: Check for broken links
        run: |
          # Use npx linkinator to check for broken links in the generated public folder
          npx linkinator ./public --recurse --silent --skip "https://turboquant.network"

      - name: Add CNAME
        run: echo "freemium.services" > public/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

